# crates.io mirror (rsproxy.cn) — same as ~/.cargo/config.toml for RU/CN networks.
# GitHub Actions also uses this; avoids index.crates.io/config.json timeouts.
[source.crates-io]
replace-with = "rsproxy-sparse"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[registries.rsproxy-sparse]
index = "sparse+https://rsproxy.cn/index/"

[net]
git-fetch-with-cli = true

[http]
timeout = 300
low-speed-limit = 1
check-revoke = false
