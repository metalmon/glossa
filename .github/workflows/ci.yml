name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Whole-workspace compile check (ubuntu only). Retries transient registry failures.
      - name: cargo check (workspace)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo check --workspace --release --locked; then
              exit 0
            fi
            echo "cargo check failed (attempt ${attempt}/3), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: cargo test (glossa)
        run: cargo test -p glossa --release --locked

      - name: cargo test (kb-eval)
        run: cargo test -p kb-eval --release --locked
