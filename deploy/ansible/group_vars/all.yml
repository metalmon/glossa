glossa_version: "1.2.0"
glossa_repo: "metalmon/glossa"
glossa_install_dir: "/opt/glossa"
glossa_bin_dir: "{{ glossa_install_dir }}/bin"
glossa_corpus_path: "/srv/glossa/corpus"
glossa_profile: "reader"
glossa_bind: "127.0.0.1:8080"
glossa_user: "glossa"
glossa_group: "glossa"
glossa_target: "x86_64-unknown-linux-gnu"
glossa_allowed_host: "localhost"
