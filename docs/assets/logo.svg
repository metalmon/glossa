<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 52" role="img" aria-label="glossa">
  <defs>
    <style>
      .mark { fill: #2563eb; }
      .word { fill: #111827; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; font-size: 40px; font-weight: 650; letter-spacing: -0.03em; }
      @media (prefers-color-scheme: dark) {
        .word { fill: #f3f4f6; }
        .mark { fill: #60a5fa; }
      }
    </style>
  </defs>
  <!-- horizontal lockup; viewBox trimmed so left/right padding is equal -->
  <rect class="mark" x="0" y="6" width="34" height="7" rx="2" opacity="0.4"/>
  <rect class="mark" x="4" y="18" width="34" height="7" rx="2" opacity="0.65"/>
  <rect class="mark" x="8" y="30" width="34" height="7" rx="2"/>
  <rect class="mark" x="22" y="6" width="3" height="31" rx="1" opacity="0.3"/>
  <circle class="mark" cx="23.5" cy="44" r="3"/>
  <text class="word" x="50" y="40">glossa</text>
</svg>
