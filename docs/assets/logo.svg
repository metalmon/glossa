<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 72" role="img" aria-label="glossa">
  <defs>
    <style>
      .mark { fill: #2563eb; }
      .word { fill: #111827; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; font-size: 36px; font-weight: 650; letter-spacing: -0.03em; }
      @media (prefers-color-scheme: dark) {
        .word { fill: #f3f4f6; }
        .mark { fill: #60a5fa; }
      }
    </style>
  </defs>
  <!-- icon centered above wordmark -->
  <g transform="translate(80, 0)">
    <g transform="translate(-21, 6)">
      <rect class="mark" x="0" y="0" width="34" height="6" rx="2" opacity="0.4"/>
      <rect class="mark" x="4" y="10" width="34" height="6" rx="2" opacity="0.65"/>
      <rect class="mark" x="8" y="20" width="34" height="6" rx="2"/>
      <rect class="mark" x="22" y="0" width="3" height="26" rx="1" opacity="0.3"/>
      <circle class="mark" cx="23.5" cy="32" r="3"/>
    </g>
    <text class="word" x="0" y="62" text-anchor="middle">glossa</text>
  </g>
</svg>
