# TensorZero config for the glossa HotpotQA eval (Track-B capture + prompt optimization).
#
# The PROMPT lives here (variant system_template) so TensorZero owns it and can version,
# A/B, and optimize it from feedback. The eval harness calls the `answer_hotpot` function
# with the question as input, EXECUTES the search/read tools against glossa in-process, and
# POSTs em/f1/retrieved feedback per episode.

# ── Model provider: LM Studio (OpenAI-compatible) on the host, serving Qwen3.5-4B ──
[models.qwen]
routing = ["lmstudio"]

[models.qwen.providers.lmstudio]
type = "openai"
api_base = "http://host.docker.internal:1234/v1"   # LM Studio on the host
model_name = "qwen3.5-4b"
# LM Studio auth is enabled -> read the key from the gateway env (set in .env).
# If you disable LM Studio auth, change this to:  api_key_location = "none"
api_key_location = "env::LMSTUDIO_API_KEY"

# ── Embedding model (LM Studio, for DICL optimization) ──
[embedding_models.lmstudio_embed]
routing = ["lmstudio"]

[embedding_models.lmstudio_embed.providers.lmstudio]
type = "openai"
api_base = "http://host.docker.internal:1234/v1"
model_name = "text-embedding-nomic-embed-text-v1.5"
api_key_location = "env::LMSTUDIO_API_KEY"

# ── Object storage: required for image/file content blocks (e.g. Zed sending a
# screenshot to the `coding` function). "disabled" = don't persist the image,
# but still forward it to the model. Switch to type = "filesystem"/"s3" if you
# later want inputs stored for observability. ──
[object_storage]
type = "disabled"

# ── Coding model: Qwen3.6-35B-A3B via OpenRouter (OpenAI-compatible) ──
# Separate endpoint, unrelated to the HotpotQA eval. Exposed to Zed (or any
# OpenAI client) through the gateway's /openai/v1 endpoint as the `coding` function.
[models.qwen3_coder]
routing = ["openrouter"]

[models.qwen3_coder.providers.openrouter]
type = "openai"
api_base = "https://openrouter.ai/api/v1"
model_name = "qwen/qwen3.6-35b-a3b"
api_key_location = "env::OPENROUTER_API_KEY"

# ── Coding function: the sampling params live HERE so clients (Zed) can't fall
# back to looping defaults. Reference it as model "tensorzero::function_name::coding".
# Qwen3.6 non-thinking / Instruct preset, tuned against endless repetition
# (official model-card values; presence_penalty is the main anti-loop lever).
[functions.coding]
type = "chat"

[functions.coding.variants.qwen]
type = "chat_completion"
model = "qwen3_coder"
# Qwen3.6-35B-A3B non-thinking / Instruct coding preset (official model-card values):
# temp 0.7 / top_p 0.80 / top_k 20 / presence_penalty 1.5. presence_penalty is the
# anti-loop lever; the model card uses 0.0 only for *thinking* precise-coding mode.
temperature = 0.7
top_p = 0.8
presence_penalty = 1.5
# top_k / min_p aren't first-class TensorZero params, and reasoning is disabled
# for Instruct mode -> pass these straight through to OpenRouter via extra_body.
# To switch to thinking "precise coding" mode: set reasoning.enabled = true,
# temperature = 0.6, top_p = 0.95, presence_penalty = 0.0.
extra_body = [
  { pointer = "/top_k", value = 20 },
  { pointer = "/min_p", value = 0 },
  { pointer = "/reasoning", value = { enabled = false } },
  # NO provider pin: let OpenRouter route across ALL providers for fallback (avoids 429
  # rate-limits from pinning to a few). Trade-off: images may hit a text-only provider
  # and 400 — re-add a provider pin if/when vision via this function is needed.
  # Zed does NOT trim context for openai_compatible providers -> a long coding thread
  # (text + tool defs + output) can exceed 262144 and OpenRouter 400s. middle-out lets
  # OpenRouter compress the oversized prompt to fit instead of erroring.
  { pointer = "/transforms", value = ["middle-out"] },
]

# ── Second coding model: Qwen3.6-27B (dense) via OpenRouter ──
[models.qwen3_27b]
routing = ["openrouter"]

[models.qwen3_27b.providers.openrouter]
type = "openai"
api_base = "https://openrouter.ai/api/v1"
model_name = "qwen/qwen3.6-27b"
api_key_location = "env::OPENROUTER_API_KEY"

# Reference from Zed as model "tensorzero::function_name::coding_27b".
[functions.coding_27b]
type = "chat"

[functions.coding_27b.variants.qwen]
type = "chat_completion"
model = "qwen3_27b"
# Qwen3.6-27B Instruct coding preset. reasoning MUST be off: Zed's openai_compatible
# parser chokes on `reasoning` stream deltas and hangs (zed #46794), so we force a
# content-only stream here.
temperature = 0.7
top_p = 0.8
presence_penalty = 1.5
extra_body = [
  { pointer = "/top_k", value = 20 },
  { pointer = "/min_p", value = 0 },
  { pointer = "/reasoning", value = { enabled = false } },
  # NO provider pin: full OpenRouter fallback to avoid 429 (see `coding` note; images
  # may 400 on a text-only provider — re-add a pin if vision is needed here).
  # Let OpenRouter compress an oversized prompt to fit (Zed doesn't trim) — see `coding`.
  { pointer = "/transforms", value = ["middle-out"] },
]

# ── GEPA reflection model: DeepSeek-R1 via OpenRouter ──
# The mutator for `kb-train optimize` — it reads search/read prompt failures and proposes an
# improved prompt. Low volume (a handful of calls per run), high leverage, so a strong
# reasoning model is worth it; R1 is cheap (~cents/run). Routed THROUGH the gateway so it
# reuses the gateway's OPENROUTER_API_KEY and shows up as a TZ inference (observability).
# Reference as model "tensorzero::model_name::deepseek_r1".
[models.deepseek_r1]
routing = ["openrouter"]

[models.deepseek_r1.providers.openrouter]
type = "openai"
api_base = "https://openrouter.ai/api/v1"
model_name = "deepseek/deepseek-r1"
api_key_location = "env::OPENROUTER_API_KEY"

# ── GEPA search micro-task: emit search(query) for a question ──
# `kb-train optimize` passes the evolving prod prompt via `input.system` on each /inference call.
[functions.search]
type = "chat"
tools = ["search"]
parallel_tool_calls = false

[functions.search.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "search/system.minijinja"
max_tokens = 512
temperature = 1.0
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
]

# ── GEPA read micro-task: pick read(path,n) after prefilled search hits ──
[functions.read]
type = "chat"
tools = ["read"]
parallel_tool_calls = false

[functions.read.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "read/system.minijinja"
max_tokens = 512
temperature = 0.0

# ── GEPA reflection: mutator proposes an improved system prompt from failures ──
[functions.gepa_reflect]
type = "chat"

[functions.gepa_reflect.variants.baseline]
type = "chat_completion"
model = "deepseek_r1"
temperature = 1.0
max_tokens = 4096

# ── The agent function: answer a HotpotQA question via glossa search/read ──
[functions.answer_hotpot]
type = "chat"
# >>> GENERATED TOOL LIST
tools = ["glob", "glossary", "grep", "neighbors", "read", "resolve", "search"]
# <<< GENERATED TOOL LIST
parallel_tool_calls = true   # let the model issue several search/grep/read calls in one turn

[functions.answer_hotpot.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "answer_hotpot/system.minijinja"
# Sampling preset tuned to curb the small model's repetition/looping without crushing
# exploration. top_k/min_p/repetition_penalty are llama.cpp params → passed via extra_body.
# max_tokens caps any runaway turn.
max_tokens = 2048
temperature = 1.0
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
]
# Add more [functions.answer_hotpot.variants.<name>] blocks (with `weight`) to A/B
# alternative prompts; TensorZero optimization can then propose better variants.

# ── Control arm for the graph ablation: the SAME prompt and sampling as answer_hotpot, but with
# the reasoning-graph tools (glossary/neighbors/resolve) removed and the graph paragraph dropped
# from the prompt — so the small model is never told to call a tool it doesn't have. The ablation
# knob is exactly this: tool list + matching prompt. Run with `--tensorzero-function answer_hotpot_nograph`.
[functions.answer_hotpot_nograph]
type = "chat"
tools = ["glob", "grep", "read", "search"]
parallel_tool_calls = true

[functions.answer_hotpot_nograph.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "answer_hotpot_nograph/system.minijinja"
max_tokens = 2048
temperature = 1.0
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
]

# ── Tools (the GATEWAY only declares them; the eval HARNESS executes them on glossa) ──
# >>> GENERATED TOOLS (kb dump-tz-tools) — do not edit by hand
[tools.glob]
description = "List knowledge-base documents whose path matches a ripgrep `-g` glob (e.g. `*`, `**/*`, `*.pdf`, `*.{pdf,htm}`, `*АБАК*`). Returns one `path  (N chunks)` per line — use it to discover what documents exist or find a file by name, then `read(path, n)` or scope a `search`/`grep` to it. N is the document's last chunk number (page/section count)."
parameters = "tools/glob.json"

[tools.glossary]
description = "Resolve a concept (a symptom, error, component or task in a few words) to graph nodes. A reasoning node prints its `id [type] label` followed by its full chain — cause → resolution — each with a `read path #n` anchor, so ONE call gives you the likely fix. The line may also show `· comm N · pr …` — the problem cluster id. After a hit, call `neighbors(<that node id>)` to list alternate and related cases before searching again. Structural Section/Document nodes show their `path #n` anchor. Empty result = nothing matches yet. Morphology-aware over labels/aliases. Also call it before creating a node, to REUSE an existing one."
parameters = "tools/glossary.json"

[tools.graph_delete]
description = "Remove reasoning nodes/edges from the graph by label — use it to delete a node or relation you added by mistake or that is no longer valid. Deleting a node also removes edges touching it."
parameters = "tools/graph_delete.json"

[tools.graph_generalize]
description = "Recompute the graph's DERIVED layer from what is currently stored: transitive-closure edges, SIMILAR links, communities and centrality (these surface in `glossary`/`neighbors`). Non-destructive — it never deletes or merges nodes. It also REPORTS how many degenerate reasoning chains exist as `prune_candidates` (a node off the reasoning spine) without removing them; actual pruning is a deliberate operator action. Run it after a batch of edits to refresh the derived view."
parameters = "tools/graph_generalize.json"

[tools.graph_stats]
description = "Graph node/edge counts and community overview: each community's size plus up to eight reasoning nodes ranked by centrality (`id [type] label`, PageRank)."
parameters = "tools/graph_stats.json"

[tools.graph_update]
description = "Edit an existing graph node in place — change its label or type while keeping its id and all its edges (delete-and-recreate would drop the edges). Identify the node by its label. To correct an edge, remove it with graph_delete and add the right one with graph_upsert."
parameters = "tools/graph_update.json"

[tools.graph_upsert]
description = "Create/update reasoning nodes and directed edges. Each node needs a human-readable `label`, `node_type`, and indexed `source_path`. Reference endpoints in `edges` by label (or section `<path>#<n>`). The response lists written node ids and resolved edges. Send a node and edges that reference it in the same call."
parameters = "tools/graph_upsert.json"

[tools.grep]
description = "Find an exact string in the text — a code, version, identifier, parameter name, error message, or exact phrase (e.g. `maxTsdr`, `5.7.2`). ripgrep regex supported; smart-case. Use it whenever the question names a precise token to locate (codes/versions/part numbers beat keyword `search`). For fuzzy/conceptual lookup, use `search`. Returns matching lines as `path:#n: line`; read the full chunk with `read(path, n)`."
parameters = "tools/grep.json"

[tools.index]
description = "Build/update the index + structural graph for the knowledge base."
parameters = "tools/index.json"

[tools.neighbors]
description = "Broaden a `glossary` hit — list OTHER solved cases linked to the same node. Call AFTER `glossary` when the cause→resolution chain is close but not quite right, you want alternates, or before running another search. Pass the reasoning-node `node` id copied from the glossary line (the token before `[Symptom]`/`[Cause]`/`[Resolution]`, e.g. `sym:...`), or a chunk `path` + `n`. Each line is prefixed and has a `read path #n` anchor: `SIMILAR` — paraphrase cases that share evidence; `COMMUNITY` — other nodes in the same problem cluster (same `comm N` as the glossary suffix), top by centrality. Empty → try another glossary term or fall back to search/grep. For the node's OWN chain, use `glossary` — not neighbors."
parameters = "tools/neighbors.json"

[tools.purge]
description = "Delete the index + graph for the knowledge base."
parameters = "tools/purge.json"

[tools.read]
description = "Read material by reference. Usually a document chunk: pass the `path` and chunk number `n` (the `[#n]` from a search/grep result; for PDFs the page). Returns the chunk's full text plus prev/next chunk numbers; if `n` is out of range the reply states the valid range. You may ALSO pass a graph NODE id (e.g. a Resolution id from a `glossary` line) as `path` — then it returns that node plus every evidence chunk it and its 1-hop chain MENTION, each labelled with where it came from."
parameters = "tools/read.json"

[tools.reindex]
description = "Rebuild the index + graph from scratch."
parameters = "tools/reindex.json"

[tools.resolve]
description = "Resolve a name to existing graph node ids (entity resolution)."
parameters = "tools/resolve.json"

[tools.search]
description = "Full-text search over the knowledge base — natural-language keywords (morphology-aware, BM25-ranked), NOT a regex. Returns ranked hits, one per line as `[#n] path · label · snippet`. Open a hit with `read(path, n)` using that `[#n]` number. Scope with optional glob/file_type filters; for an exact token or code use `grep` instead. Hits are ranked best-first — the top few usually contain the answer, so read those rather than running many searches."
parameters = "tools/search.json"

[tools.done]
description = "Signal that the reasoning graph for this case is complete — the chain is written with a MENTIONS anchor, or `glossary` showed it already exists. Calling `done` ends the episode. Give a one-line `note`."
parameters = "tools/done.json"
# <<< GENERATED TOOLS

# ── Constraint validation tools ──
[tools.get_ontology]
description = "Return the full constraint ontology: entity types, relation types, constraint types, prefixes, and the strict validation flag."
parameters = "tools/get_ontology.json"

[tools.constraint_solve]
description = "Run the CSP constraint solver. Modes: validate (check field assignments), infer (show valid domains for each field), check (consistency of the constraint graph). Returns structured violation/domain/issue data."
parameters = "tools/constraint_solve.json"

# ── Constraint validation function (CSP + LLM epistemic eval) ──
[functions.constraint_validate]
type = "chat"
tools = ["get_ontology", "constraint_solve"]
parallel_tool_calls = true

[functions.constraint_validate.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "constraint_validate/system.minijinja"
max_tokens = 1024
temperature = 0.2
top_p = 0.9
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.05 },
]

# ── Enricher function: reverse-trace solved support cases into graph edges ──
# (the enricher is a read+edit agent → its tool list is the Editor profile, generated from MCP.)
[functions.enrich]
type = "chat"
# >>> GENERATED ENRICH TOOL LIST (kb dump-tz-tools) — do not edit by hand
tools = ["glob", "glossary", "graph_delete", "graph_generalize", "graph_stats", "graph_update", "graph_upsert", "grep", "index", "neighbors", "read", "reindex", "resolve", "search", "done"]
# <<< GENERATED ENRICH TOOL LIST
parallel_tool_calls = true

[functions.enrich.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "enrich/system.minijinja"
max_tokens = 2048
# Reasoning OFF — fixes the Qwen3.x agentic empty-turn early-stop (finish_reason=stop, tool_calls=0).
# Sampling KEEPS the proven anti-loop combo (temp 0.8 + min_p 0.1 + repetition_penalty 1.1): lower
# temp made the agentic loop repeat rejected calls, and presence_penalty 1.5 alone did not hold it.
temperature = 1.0
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
  { pointer = "/reasoning", value = { enabled = false } },
]

