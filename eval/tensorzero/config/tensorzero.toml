# TensorZero config for the glossa HotpotQA eval (Track-B capture + prompt optimization).
#
# The PROMPT lives here (variant system_template) so TensorZero owns it and can version,
# A/B, and optimize it from feedback. The eval harness calls the `answer_hotpot` function
# with the question as input, EXECUTES the search/read tools against glossa in-process, and
# POSTs em/f1/retrieved feedback per episode.

# ── Model provider: LM Studio (OpenAI-compatible) on the host, serving Qwen3.5-4B ──
[models.qwen]
routing = ["lmstudio"]

[models.qwen.providers.lmstudio]
type = "openai"
api_base = "http://host.docker.internal:1234/v1"   # LM Studio on the host
model_name = "qwen3.5-4b"
# LM Studio auth is enabled -> read the key from the gateway env (set in .env).
# If you disable LM Studio auth, change this to:  api_key_location = "none"
api_key_location = "env::LMSTUDIO_API_KEY"

# ── Embedding model (LM Studio, for DICL optimization) ──
[embedding_models.lmstudio_embed]
routing = ["lmstudio"]

[embedding_models.lmstudio_embed.providers.lmstudio]
type = "openai"
api_base = "http://host.docker.internal:1234/v1"
model_name = "text-embedding-nomic-embed-text-v1.5"
api_key_location = "env::LMSTUDIO_API_KEY"

# ── Object storage: required for image/file content blocks (e.g. Zed sending a
# screenshot to the `coding` function). "disabled" = don't persist the image,
# but still forward it to the model. Switch to type = "filesystem"/"s3" if you
# later want inputs stored for observability. ──
[object_storage]
type = "disabled"

# ── Coding model: Qwen3.6-35B-A3B via OpenRouter (OpenAI-compatible) ──
# Separate endpoint, unrelated to the HotpotQA eval. Exposed to Zed (or any
# OpenAI client) through the gateway's /openai/v1 endpoint as the `coding` function.
[models.qwen3_coder]
routing = ["openrouter"]

[models.qwen3_coder.providers.openrouter]
type = "openai"
api_base = "https://openrouter.ai/api/v1"
model_name = "qwen/qwen3.6-35b-a3b"
api_key_location = "env::OPENROUTER_API_KEY"

# ── Coding function: the sampling params live HERE so clients (Zed) can't fall
# back to looping defaults. Reference it as model "tensorzero::function_name::coding".
# Qwen3.6 non-thinking / Instruct preset, tuned against endless repetition
# (official model-card values; presence_penalty is the main anti-loop lever).
[functions.coding]
type = "chat"

[functions.coding.variants.qwen]
type = "chat_completion"
model = "qwen3_coder"
# Qwen3.6-35B-A3B non-thinking / Instruct coding preset (official model-card values):
# temp 0.7 / top_p 0.80 / top_k 20 / presence_penalty 1.5. presence_penalty is the
# anti-loop lever; the model card uses 0.0 only for *thinking* precise-coding mode.
temperature = 0.7
top_p = 0.8
presence_penalty = 1.5
# top_k / min_p aren't first-class TensorZero params, and reasoning is disabled
# for Instruct mode -> pass these straight through to OpenRouter via extra_body.
# To switch to thinking "precise coding" mode: set reasoning.enabled = true,
# temperature = 0.6, top_p = 0.95, presence_penalty = 0.0.
extra_body = [
  { pointer = "/top_k", value = 20 },
  { pointer = "/min_p", value = 0 },
  { pointer = "/reasoning", value = { enabled = false } },
  # NO provider pin: let OpenRouter route across ALL providers for fallback (avoids 429
  # rate-limits from pinning to a few). Trade-off: images may hit a text-only provider
  # and 400 — re-add a provider pin if/when vision via this function is needed.
  # Zed does NOT trim context for openai_compatible providers -> a long coding thread
  # (text + tool defs + output) can exceed 262144 and OpenRouter 400s. middle-out lets
  # OpenRouter compress the oversized prompt to fit instead of erroring.
  { pointer = "/transforms", value = ["middle-out"] },
]

# ── Second coding model: Qwen3.6-27B (dense) via OpenRouter ──
[models.qwen3_27b]
routing = ["openrouter"]

[models.qwen3_27b.providers.openrouter]
type = "openai"
api_base = "https://openrouter.ai/api/v1"
model_name = "qwen/qwen3.6-27b"
api_key_location = "env::OPENROUTER_API_KEY"

# Reference from Zed as model "tensorzero::function_name::coding_27b".
[functions.coding_27b]
type = "chat"

[functions.coding_27b.variants.qwen]
type = "chat_completion"
model = "qwen3_27b"
# Qwen3.6-27B Instruct coding preset. reasoning MUST be off: Zed's openai_compatible
# parser chokes on `reasoning` stream deltas and hangs (zed #46794), so we force a
# content-only stream here.
temperature = 0.7
top_p = 0.8
presence_penalty = 1.5
extra_body = [
  { pointer = "/top_k", value = 20 },
  { pointer = "/min_p", value = 0 },
  { pointer = "/reasoning", value = { enabled = false } },
  # NO provider pin: full OpenRouter fallback to avoid 429 (see `coding` note; images
  # may 400 on a text-only provider — re-add a pin if vision is needed here).
  # Let OpenRouter compress an oversized prompt to fit (Zed doesn't trim) — see `coding`.
  { pointer = "/transforms", value = ["middle-out"] },
]

# ── The agent function: answer a HotpotQA question via glossa search/read ──
[functions.answer_hotpot]
type = "chat"
# >>> GENERATED TOOL LIST
tools = ["glob", "glossary", "grep", "neighbors", "read", "resolve", "search"]
# <<< GENERATED TOOL LIST
parallel_tool_calls = true   # let the model issue several search/grep/read calls in one turn

[functions.answer_hotpot.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "answer_hotpot/system.minijinja"
# Sampling preset tuned to curb the small model's repetition/looping without crushing
# exploration. top_k/min_p/repetition_penalty are llama.cpp params → passed via extra_body.
# max_tokens caps any runaway turn.
max_tokens = 2048
temperature = 0.8
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
]
# Add more [functions.answer_hotpot.variants.<name>] blocks (with `weight`) to A/B
# alternative prompts; TensorZero optimization can then propose better variants.

# ── Tools (the GATEWAY only declares them; the eval HARNESS executes them on glossa) ──
# >>> GENERATED TOOLS (kb dump-tz-tools) — do not edit by hand
[tools.glob]
description = "List knowledge-base documents whose path matches a shell glob (e.g. `*.pdf`, `*Safety*`, `*АБАК*`). Returns one `path  (N chunks)` per line — use it to discover what documents exist or find a file by name, then `read(path, n)` or scope a `search`/`grep` to it. N is the document's last chunk number (page/section count)."
parameters = "tools/glob.json"

[tools.glossary]
description = "List existing graph nodes whose label matches a concept, one per line as `id [type] label` — reasoning nodes (Symptom/Cause/Resolution/Task) plus structural Section/Document (those also show a `path #n` anchor). Call it BEFORE creating a node to find and REUSE an existing one instead of duplicating; an empty result means nothing matches yet. Matching is morphology-aware over labels/aliases."
parameters = "tools/glossary.json"

[tools.graph_delete]
description = "Remove reasoning nodes/edges from the graph by label — use it to delete a node or relation you added by mistake or that is no longer valid. Deleting a node also removes edges touching it."
parameters = "tools/graph_delete.json"

[tools.graph_update]
description = "Edit an existing graph node in place — change its label or type while keeping its id and all its edges (delete-and-recreate would drop the edges). Identify the node by its current label. To correct an edge, remove it with graph_delete and add the right one with graph_upsert."
parameters = "tools/graph_update.json"

[tools.graph_upsert]
description = "Upsert agent-built graph nodes/edges (validated against ontology.toml). Each node/edge needs id/type/label and a source_path for provenance. Write each label as a broad, reusable CLASS in the knowledge base's language (not the specifics of one case). A Resolution label names the FIX ACTION — e.g. 'increase the retransmit timeout' — never the concrete value; keep concrete values (numbers, codes) in the document that a MENTIONS edge anchors. Send a node and the edges referencing it in the same call so both endpoints exist; nodes with the same type+label are merged."
parameters = "tools/graph_upsert.json"

[tools.grep]
description = "Find an exact string in the text — a code, version, identifier, parameter name, error message, or exact phrase (e.g. `maxTsdr`, `5.7.2`). ripgrep regex supported; smart-case. Use it whenever the question names a precise token to locate (codes/versions/part numbers beat keyword `search`). For fuzzy/conceptual lookup, use `search`. Returns matching lines as `path:#n: line`; read the full chunk with `read(path, n)`."
parameters = "tools/grep.json"

[tools.index]
description = "Build/update the index + structural graph for the knowledge base."
parameters = "tools/index.json"

[tools.neighbors]
description = "Graph neighbors of a chunk — pass the document `path` and chunk number `n` (the `[#n]` from a search/grep result). Returns linked sections/documents as `RELATION  path  #n · label`; read any with `read(path, n)`. Direct (1-hop) neighbors."
parameters = "tools/neighbors.json"

[tools.purge]
description = "Delete the index + graph for the knowledge base."
parameters = "tools/purge.json"

[tools.read]
description = "Read a document chunk by its number `n` — the `[#n]` from a search/grep result (for PDFs, the page number). Returns the chunk's full text plus the previous/next chunk numbers for context expansion. If `n` is out of range, the reply states the document's valid chunk range."
parameters = "tools/read.json"

[tools.reindex]
description = "Rebuild the index + graph from scratch."
parameters = "tools/reindex.json"

[tools.resolve]
description = "Resolve a name to existing graph node ids (entity resolution)."
parameters = "tools/resolve.json"

[tools.search]
description = "Full-text search over the knowledge base — natural-language keywords (Russian or English; morphology-aware, BM25-ranked), NOT a regex. Returns ranked hits, one per line as `[#n] path · label · snippet`. Open a hit with `read(path, n)` using that `[#n]` number. Scope with optional glob/file_type filters; for an exact token or code use `grep` instead. Hits are ranked best-first — the top few usually contain the answer, so read those rather than running many searches."
parameters = "tools/search.json"
# <<< GENERATED TOOLS

# ── Enricher function: reverse-trace solved support cases into graph edges ──
# (graph_upsert/graph_delete defs now come from MCP via the GENERATED TOOLS block above.)
[functions.enrich]
type = "chat"
tools = ["search", "read", "grep", "glossary", "neighbors", "graph_upsert", "graph_update", "graph_delete"]
parallel_tool_calls = true

[functions.enrich.variants.baseline]
type = "chat_completion"
model = "qwen"
system_template = "enrich/system.minijinja"
max_tokens = 2048
temperature = 0.8
top_p = 0.95
extra_body = [
  { pointer = "/top_k", value = 40 },
  { pointer = "/min_p", value = 0.1 },
  { pointer = "/repetition_penalty", value = 1.1 },
]

