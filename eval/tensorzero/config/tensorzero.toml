[metrics.em]
type = "boolean"
optimize = "max"
level = "episode"

[metrics.f1]
type = "float"
optimize = "max"
level = "episode"

[metrics.retrieved]
type = "boolean"
optimize = "max"
level = "episode"

[metrics.recall_at_5]
type = "float"
optimize = "max"
level = "episode"

[metrics.recall_at_10]
type = "float"
optimize = "max"
level = "episode"

[metrics.recall_at_20]
type = "float"
optimize = "max"
level = "episode"

[metrics.mrr]
type = "float"
optimize = "max"
level = "episode"

[metrics.judge]
type = "float"
optimize = "max"
level = "episode"

# ── Enricher telemetry (per-case, posted by `kb-eval enrich`) ──
[metrics.enrich_nodes]
type = "float"
optimize = "max"
level = "episode"

[metrics.enrich_edges]
type = "float"
optimize = "max"
level = "episode"

[metrics.enrich_errors]
type = "float"
optimize = "min"
level = "episode"

[metrics.enrich_rounds]
type = "float"
optimize = "min"
level = "episode"
